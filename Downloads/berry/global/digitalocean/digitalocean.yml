components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Personal Access Token

  security:
    - bearerAuth: []

  parameters:
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 25
        maximum: 200
      description: Number of items per page
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Page number

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # Account Schemas
    Account:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/AccountDetails'

    AccountDetails:
      type: object
      properties:
        uuid:
          type: string
          description: The unique universal identifier for the account.
        email:
          type: string
          description: The email address of the account.
        name:
          type: string
          description: The full name of the account owner.
        droplet_limit:
          type: integer
          description: The maximum number of Droplets allowed in the account.
        floating_ip_limit:
          type: integer
          description: The maximum number of floating IPs allowed in the account.
        volume_limit:
          type: integer
          description: The maximum number of block storage volumes allowed in the account.
        email_verified:
          type: boolean
          description: Whether the account's email has been verified.
        status:
          type: string
          enum: [active, warning, locked]
          description: The status of the account.
        status_message:
          type: string
          description: A message providing additional details about the account status.

    # SSH Key Schemas
    SSHKeys:
      type: object
      properties:
        ssh_keys:
          type: array
          items:
            $ref: '#/components/schemas/SSHKey'

    SSHKey:
      type: object
      properties:
        id:
          type: integer
          description: The unique ID of the SSH key.
        fingerprint:
          type: string
          description: The fingerprint of the SSH key.
        public_key:
          type: string
          description: The full public key string.
        name:
          type: string
          description: The name of the SSH key.

    SSHKeyCreate:
      type: object
      required:
        - name
        - public_key
      properties:
        name:
          type: string
          description: The name to give the new SSH key.
        public_key:
          type: string
          description: The public key string.

    SSHKeyUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The new name for the SSH key.

    # Droplet Schemas
    Droplets:
      type: object
      properties:
        droplets:
          type: array
          items:
            $ref: '#/components/schemas/Droplet'

    Droplet:
      type: object
      properties:
        id:
          type: integer
          description: The unique ID of the Droplet.
        name:
          type: string
          description: The name of the Droplet.
        memory:
          type: integer
          description: The RAM of the Droplet in MB.
        vcpus:
          type: integer
          description: The number of virtual CPUs.
        disk:
          type: integer
          description: The size of the disk in GB.
        locked:
          type: boolean
          description: Whether the Droplet is locked.
        status:
          type: string
          enum: [new, active, off, archived]
          description: The status of the Droplet.
        created_at:
          type: string
          format: date-time
          description: The creation date and time of the Droplet.
        features:
          type: array
          items:
            type: string
          description: Array of enabled features.
        tags:
          type: array
          items:
            type: string
          description: Array of tags applied to the Droplet.
        region:
          $ref: '#/components/schemas/Region'
        image:
          $ref: '#/components/schemas/Image'
        size:
          $ref: '#/components/schemas/Size'
        networks:
          $ref: '#/components/schemas/Networks'
        kernel:
          $ref: '#/components/schemas/Kernel'

    DropletCreate:
      type: object
      required:
        - name
        - size
        - image
        - region
      properties:
        name:
          type: string
          description: The name of the new Droplet.
        size:
          type: string
          description: The size slug of the Droplet.
        image:
          type: string
          description: The image ID or slug.
        region:
          type: string
          description: The region slug.
        ssh_keys:
          type: array
          items:
            type: integer
          description: Array of SSH key IDs.
        backups:
          type: boolean
          default: false
          description: Whether to enable backups.
        ipv6:
          type: boolean
          default: false
          description: Whether to enable IPv6.
        private_networking:
          type: boolean
          default: false
          description: Whether to enable private networking.
        tags:
          type: array
          items:
            type: string
          description: Array of tags to apply.
        user_data:
          type: string
          description: Cloud-init user data.
        monitoring:
          type: boolean
          default: false
          description: Whether to install the monitoring agent.

    DropletCreateResponse:
      type: object
      properties:
        droplet:
          $ref: '#/components/schemas/Droplet'
        links:
          $ref: '#/components/schemas/Links'

    DropletAction:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - enable_backups
            - disable_backups
            - reboot
            - power_off
            - power_on
            - shutdown
            - reset_root_password
            - resize
            - restore
            - rebuild
            - rename
            - change_kernel
            - enable_ipv6
            - disable_ipv6
            - create_snapshot
            - restore_snapshot
          description: The type of action to perform.
        size:
          type: string
          description: The size slug when resizing.
        name:
          type: string
          description: The new name when renaming.
        image:
          type: string
          description: The image ID or slug when rebuilding.

    # Kubernetes Schemas
    KubernetesClusters:
      type: object
      properties:
        kubernetes_clusters:
          type: array
          items:
            $ref: '#/components/schemas/KubernetesCluster'

    KubernetesCluster:
      type: object
      properties:
        id:
          type: string
          description: The unique ID of the cluster.
        name:
          type: string
          description: The name of the cluster.
        region:
          type: string
          description: The region of the cluster.
        version:
          type: string
          description: The Kubernetes version.
        cluster_subnet:
          type: string
          description: The cluster subnet CIDR.
        service_subnet:
          type: string
          description: The service subnet CIDR.
        node_pools:
          type: array
          items:
            $ref: '#/components/schemas/KubernetesNodePool'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        endpoint:
          type: string
          description: The API server endpoint.
        tags:
          type: array
          items:
            type: string

    KubernetesClusterCreate:
      type: object
      required:
        - name
        - region
        - version
        - node_pools
      properties:
        name:
          type: string
          description: The name for the cluster.
        region:
          type: string
          description: The region where the cluster will be created.
        version:
          type: string
          description: The Kubernetes version.
        node_pools:
          type: array
          items:
            $ref: '#/components/schemas/KubernetesNodePoolCreate'

    KubernetesNodePools:
      type: object
      properties:
        node_pools:
          type: array
          items:
            $ref: '#/components/schemas/KubernetesNodePool'

    KubernetesNodePool:
      type: object
      properties:
        id:
          type: string
          description: The unique ID of the node pool.
        name:
          type: string
