name: Scrape CI

on:
  push:
    branches: [main]
    paths:
      - 'scrape/**'
  pull_request:
    branches: [main]
    paths:
      - 'scrape/**'

env:
  PYTHON_VERSION: '3.13'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: scrape/requirements.txt

      - name: Install dependencies
        run: pip install -r scrape/requirements.txt -q

      - name: Install linting tools
        run: pip install ruff -q

      - name: Run linter
        run: ruff check scrape/main.py scrape/build_tickers_csv.py

      - name: Check formatting
        run: ruff format --check scrape/main.py scrape/build_tickers_csv.py

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: scrape/requirements.txt

      - name: Install dependencies
        run: pip install -r scrape/requirements.txt -q

      - name: Install test tools
        run: pip install pytest pytest-cov -q

      - name: Run unit tests with coverage
        run: pytest scrape/ -m "not integration" --cov=main --cov-report=term-missing --cov-report=html:coverage -q

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  jest:
    name: Jest Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scrape/package-lock.json

      - name: Install npm dependencies
        working-directory: scrape
        run: npm ci

      - name: Install Python deps for server
        run: pip install websockets yfinance -q

      - name: Start server and run tests
        run: |
          python scrape/server.py &
          sleep 3
          cd scrape && npm run test -- --forceExit