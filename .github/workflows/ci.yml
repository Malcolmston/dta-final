name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.13'

jobs:
  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  build:
    name: Build and Test (Frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dta-final:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Scrape Python Backend ─────────────────────────────────────────────────────
  scrape-lint:
    name: Lint (Scrape)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: scrape/requirements.txt

      - name: Install dependencies
        run: pip install -r scrape/requirements.txt -q

      - name: Install linting tools
        run: pip install ruff -q

      - name: Run linter
        run: ruff check scrape/main.py scrape/build_tickers_csv.py

      - name: Check formatting
        run: ruff format --check scrape/main.py scrape/build_tickers_csv.py

  scrape-test:
    name: Test (Scrape)
    runs-on: ubuntu-latest
    needs: scrape-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: scrape/requirements.txt

      - name: Install dependencies
        run: pip install -r scrape/requirements.txt -q

      - name: Install test tools
        run: pip install pytest pytest-cov -q

      - name: Run unit tests
        run: pytest scrape/ -m "not integration" -q

  scrape-coverage:
    name: Coverage Report (Scrape)
    runs-on: ubuntu-latest
    needs: scrape-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: scrape/requirements.txt

      - name: Install dependencies
        run: pip install -r scrape/requirements.txt -q

      - name: Install test tools
        run: pip install pytest pytest-cov -q

      - name: Generate coverage report
        run: pytest scrape/ -m "not integration" --cov=main --cov-report=term-missing --cov-report=html:coverage -q

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ── Scrape Jest Tests ──────────────────────────────────────────────────────────
  scrape-jest:
    name: Jest Tests (Scrape)
    runs-on: ubuntu-latest
    needs: scrape-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: scrape/package-lock.json

      - name: Install npm dependencies
        working-directory: scrape
        run: npm ci

      - name: Install Python deps for server
        run: pip install websockets yfinance -q

      - name: Start server and run tests
        run: |
          python scrape/server.py &
          sleep 3
          cd scrape && npm run test -- --forceExit