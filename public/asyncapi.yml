asyncapi: 3.0.0
info:
  title: DTA Final Stock API
  description: |
    AsyncAPI specification for the DTA Final Stock API.

    This document describes the asynchronous operations including:
    - Background job queue operations (BullMQ with Redis)
    - Server-Sent Events (SSE) for real-time updates
    - WebSocket connections for live data streaming

    The REST endpoints are documented in openapi.yml
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/anthropics/claude-code
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  production:
    host: dta-final.vercel.app
    protocol: https
    description: Production server
  development:
    host: localhost:3000
    protocol: http
    description: Development server
  redis:
    host: redis-10848.c261.us-east-1-4.ec2.cloud.redislabs.com:10848
    protocol: redis
    description: Redis server for queue and cache

channels:
  job-lookup:
    address: job/lookup
    description: Channel for stock lookup background jobs
    messages:
      $ref: '#/components/messages/LookupJob'
    bindings:
      redis:
        isVirtualChannel: true

  job-pull:
    address: job/pull
    description: Channel for data pull background jobs
    messages:
      $ref: '#/components/messages/PullJob'
    bindings:
      redis:
        isVirtualChannel: true

  job-storage:
    address: job/storage
    description: Channel for storage management background jobs
    messages:
      $ref: '#/components/messages/StorageJob'
    bindings:
      redis:
        isVirtualChannel: true

  realtime-quote:
    address: realtime/quote
    description: Channel for real-time stock quotes (future WebSocket)
    messages:
      $ref: '#/components/messages/QuoteUpdate'
    bindings:
      ws:
        method: GET
        query:
          type: object
          properties:
            ticker:
              type: string
              description: Stock ticker symbol to subscribe to

  realtime-signals:
    address: realtime/signals
    description: Channel for real-time trading signals (future WebSocket)
    messages:
      $ref: '#/components/messages/SignalUpdate'
    bindings:
      ws:
        method: GET
        query:
          type: object
          properties:
            ticker:
              type: string
              description: Stock ticker symbol to subscribe to

  events-heatmap:
    address: events/heatmap
    description: SSE endpoint for heatmap updates
    messages:
      $ref: '#/components/messages/HeatmapEvent'
    bindings:
      http:
        method: GET
        path: /api/events/heatmap

  events-notifications:
    address: events/notifications
    description: SSE endpoint for user notifications
    messages:
      $ref: '#/components/messages/NotificationEvent'
    bindings:
      http:
        method: GET
        path: /api/events/notifications

  cache-invalidate:
    address: cache/invalidate
    description: Channel for cache invalidation events
    messages:
      $ref: '#/components/messages/CacheInvalidation'
    bindings:
      redis:
        isVirtualChannel: true

operations:
  sendLookupJob:
    action: send
    channel:
      $ref: '#/channels/job-lookup'
    summary: Submit a stock lookup job to the queue
    description: |
      Called when a user requests a stock lookup. The job is queued
      for processing by a background worker.

  sendPullJob:
    action: send
    channel:
      $ref: '#/channels/job-pull'
    summary: Submit a data pull job to the queue
    description: |
      Called during scheduled data pulls or manual refresh requests.

  sendStorageJob:
    action: send
    channel:
      $ref: '#/channels/job-storage'
    summary: Submit a storage management job to the queue
    description: |
      Called for cache cleanup, data archival, or storage optimization.

  processLookupJob:
    action: receive
    channel:
      $ref: '#/channels/job-lookup'
    summary: Process stock lookup jobs
    description: |
      Background worker that processes lookup requests.

  processPullJob:
    action: receive
    channel:
      $ref: '#/channels/job-pull'
    summary: Process data pull jobs
    description: |
      Background worker that fetches and processes stock data.

  processStorageJob:
    action: receive
    channel:
      $ref: '#/channels/job-storage'
    summary: Process storage management jobs
    description: |
      Background worker that handles storage operations.

  subscribeToQuotes:
    action: receive
    channel:
      $ref: '#/channels/realtime-quote'
    summary: Subscribe to real-time quote updates
    description: |
      WebSocket connection for receiving live price updates.

  subscribeToSignals:
    action: receive
    channel:
      $ref: '#/channels/realtime-signals'
    summary: Subscribe to real-time signal updates
    description: |
      WebSocket connection for receiving trading signal updates.

  streamHeatmap:
    action: receive
    channel:
      $ref: '#/channels/events-heatmap'
    summary: Stream heatmap updates via SSE
    description: |
      Server-Sent Events endpoint for heatmap data updates.

  streamNotifications:
    action: receive
    channel:
      $ref: '#/channels/events-notifications'
    summary: Stream notifications via SSE
    description: |
      Server-Sent Events endpoint for user notifications.

components:
  messages:
    LookupJob: {}
    PullJob: {}
    StorageJob: {}
    QuoteUpdate: {}
    SignalUpdate: {}
    HeatmapEvent: {}
    NotificationEvent: {}
    CacheInvalidation: {}

  securitySchemes:
    apiKey:
      type: httpApiKey
      name: X-API-Key
      in: header

  parameters:
    tickerParam:
      description: Stock ticker symbol
      location: $message.payload#/ticker

    periodParam:
      description: Time period for data queries (all fetches maximum available history)
      enum: [1d, 5d, 1w, 1mo, 3mo, 6mo, 1y, 2y, 5y, all]

    tickersParam:
      description: Comma-separated stock ticker symbols
      location: $message.payload#/tickers
