openapi: 3.0.3
info:
  title: DigitalOcean API
  description: |
    The DigitalOcean API allows you to programmatically manage your Droplets, Kubernetes clusters, databases, load balancers, and other cloud resources via HTTP requests.

    ## Authentication
    All API requests require a Personal Access Token (PAT) passed in the `Authorization` header:
    ```
    Authorization: Bearer YOUR_TOKEN
    ```
  version: 1.0.0
  contact:
    name: DigitalOcean API Support
    url: https://docs.digitalocean.com/reference/api/
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.digitalocean.com
    description: Production server

tags:
  - name: Droplets
    description: Virtual private servers
  - name: Kubernetes
    description: Managed Kubernetes clusters
  - name: Databases
    description: Managed databases
  - name: Load Balancers
    description: Load balancing resources
  - name: Spaces
    description: Object storage
  - name: Images
    description: Droplet images and snapshots
  - name: Volumes
    description: Block storage volumes
  - name: SSH Keys
    description: SSH key management
  - name: Domains
    description: DNS management
  - name: Firewalls
    description: Cloud firewall rules
  - name: Tags
    description: Resource tagging
  - name: Accounts
    description: Account information

paths:
  # Account Endpoints
  /v2/account:
    get:
      tags:
        - Account
      summary: Get Account Information
      description: Returns the authenticated user's account information.
      operationId: getAccount
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  /v2/account/keys:
    get:
      tags:
        - Account
      summary: List All SSH Keys
      description: Returns a list of all SSH keys in your account.
      operationId: listSSHKeys
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHKeys'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Account
      summary: Create SSH Key
      description: Creates a new SSH key in your account.
      operationId: createSSHKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSHKeyCreate'
      responses:
        '201':
          description: SSH key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHKey'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validation failed
          $ref: '#/components/responses/UnprocessableEntity'

  /v2/account/keys/{ssh_key_identifier}:
    get:
      tags:
        - Account
      summary: Get SSH Key
      description: Returns a single SSH key by its ID or fingerprint.
      operationId: getSSHKey
      parameters:
        - name: ssh_key_identifier
          in: path
          required: true
          schema:
            type: string
          description: The ID or fingerprint of the SSH key.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHKey'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not found
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Account
      summary: Update SSH Key
      description: Updates an SSH key's name.
      operationId: updateSSHKey
      parameters:
        - name: ssh_key_identifier
          in: path
          required: true
          schema:
            type: string
          description: The ID or fingerprint of the SSH key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSHKeyUpdate'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHKey'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags:
        - Account
      summary: Delete SSH Key
      description: Deletes an SSH key from your account.
      operationId: deleteSSHKey
      parameters:
        - name: ssh_key_identifier
          in: path
          required: true
          schema:
            type: string
          description: The ID or fingerprint of the SSH key.
      responses:
        '204':
          description: SSH key deleted
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not found
          $ref: '#/components/responses/NotFound'

  # Droplet Endpoints
  /v2/droplets:
    get:
      tags:
        - Droplets
      summary: List All Droplets
      description: Returns a list of all Droplets in your account.
      operationId: listDroplets
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
        - name: tag_name
          in: query
          schema:
            type: string
          description: Filter by tag
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Droplets'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Droplets
      summary: Create Droplet
      description: Creates a new Droplet.
      operationId: createDroplet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DropletCreate'
      responses:
        '202':
          description: Droplet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DropletCreateResponse'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validation failed
          $ref: '#/components/responses/UnprocessableEntity'

  /v2/droplets/{droplet_id}:
    get:
      tags:
        - Droplets
      summary: Get Droplet
      description: Returns information about a specific Droplet.
      operationId: getDroplet
      parameters:
        - name: droplet_id
          in: path
          required: true
          schema:
            type: integer
          description: The unique ID of the Droplet.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Droplet'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not found
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Droplets
      summary: Delete Droplet
      description: Deletes a Droplet.
      operationId: deleteDroplet
      parameters:
        - name: droplet_id
          in: path
          required: true
          schema:
            type: integer
          description: The unique ID of the Droplet.
      responses:
        '204':
          description: Droplet deleted
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  /v2/droplets/{droplet_id}/actions:
    get:
      tags:
        - Droplets
      summary: List Droplet Actions
      description: Returns a list of actions that have been executed on a Droplet.
      operationId: listDropletActions
      parameters:
        - name: droplet_id
          in: path
          required: true
          schema:
            type: integer
          description: The unique ID of the Droplet.
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actions'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Droplets
      summary: Create Droplet Action
      description: Creates an action on a Droplet (e.g., reboot, shutdown, resize).
      operationId: createDropletAction
      parameters:
        - name: droplet_id
          in: path
          required: true
          schema:
            type: integer
          description: The unique ID of the Droplet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DropletAction'
      responses:
        '201':
          description: Action created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  /v2/droplets/{droplet_id}/backups:
    get:
      tags:
        - Droplets
      summary: Enable Backups
      description: Enables backups for a Droplet.
      operationId: enableDropletBackups
      parameters:
        - name: droplet_id
          in: path
          required: true
          schema:
            type: integer
          description: The unique ID of the Droplet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [enable_backups]
      responses:
        '201':
          description: Action created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  /v2/droplets/{droplet_id}/snapshots:
    get:
      tags:
        - Droplets
      summary: List Droplet Snapshots
      description: Lists all snapshots for a Droplet.
      operationId: listDropletSnapshots
      parameters:
        - name: droplet_id
          in: path
          required: true
          schema:
            type: integer
          description: The unique ID of the Droplet.
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshots'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Droplets
      summary: Create Droplet Snapshot
      description: Creates a snapshot of a Droplet.
      operationId: createDropletSnapshot
      parameters:
        - name: droplet_id
          in: path
          required: true
          schema:
            type: integer
          description: The unique ID of the Droplet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotCreate'
      responses:
        '201':
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  # Kubernetes Endpoints
  /v2/kubernetes/clusters:
    get:
      tags:
        - Kubernetes
      summary: List Kubernetes Clusters
      description: Returns a list of all Kubernetes clusters in your account.
      operationId: listKubernetesClusters
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesClusters'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Kubernetes
      summary: Create Kubernetes Cluster
      description: Creates a new Kubernetes cluster.
      operationId: createKubernetesCluster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubernetesClusterCreate'
      responses:
        '201':
          description: Cluster created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesCluster'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validation failed
          $ref: '#/components/responses/UnprocessableEntity'

  /v2/kubernetes/clusters/{cluster_id}:
    get:
      tags:
        - Kubernetes
      summary: Get Kubernetes Cluster
      description: Returns information about a specific Kubernetes cluster.
      operationId: getKubernetesCluster
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the Kubernetes cluster.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesCluster'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not found
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Kubernetes
      summary: Delete Kubernetes Cluster
      description: Deletes a Kubernetes cluster.
      operationId: deleteKubernetesCluster
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the Kubernetes cluster.
      responses:
        '204':
          description: Cluster deleted
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  /v2/kubernetes/clusters/{cluster_id}/node_pools:
    get:
      tags:
        - Kubernetes
      summary: List Node Pools
      description: Returns a list of all node pools in a Kubernetes cluster.
      operationId: listKubernetesNodePools
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the Kubernetes cluster.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesNodePools'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Kubernetes
      summary: Create Node Pool
      description: Creates a new node pool in a Kubernetes cluster.
      operationId: createKubernetesNodePool
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the Kubernetes cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubernetesNodePoolCreate'
      responses:
        '201':
          description: Node pool created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesNodePool'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  # Database Endpoints
  /v2/databases:
    get:
      tags:
        - Databases
      summary: List All Databases
      description: Returns a list of all database clusters in your account.
      operationId: listDatabases
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
        - name: tag_name
          in: query
          schema:
            type: string
          description: Filter by tag
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Databases'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Databases
      summary: Create Database Cluster
      description: Creates a new database cluster.
      operationId: createDatabase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseCreate'
      responses:
        '202':
          description: Database cluster created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validation failed
          $ref: '#/components/responses/UnprocessableEntity'

  /v2/databases/{database_uuid}:
    get:
      tags:
        - Databases
      summary: Get Database Cluster
      description: Returns information about a specific database cluster.
      operationId: getDatabase
      parameters:
        - name: database_uuid
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the database cluster.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not found
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Databases
      summary: Delete Database Cluster
      description: Deletes a database cluster.
      operationId: deleteDatabase
      parameters:
        - name: database_uuid
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the database cluster.
      responses:
        '204':
          description: Database cluster deleted
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  /v2/databases/{database_uuid}/users:
    get:
      tags:
        - Databases
      summary: List Database Users
      description: Returns a list of users for a database cluster.
      operationId: listDatabaseUsers
      parameters:
        - name: database_uuid
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the database cluster.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseUsers'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Databases
      summary: Create Database User
      description: Creates a new user in a database cluster.
      operationId: createDatabaseUser
      parameters:
        - name: database_uuid
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the database cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseUserCreate'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseUser'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  /v2/databases/{database_uuid}/databases:
    get:
      tag:
        - Databases
      summary: List Databases
      description: Returns a list of databases in a cluster.
      operationId: listClusterDatabases
      parameters:
        - name: database_uuid
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the database cluster.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDatabases'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Databases
      summary: Create Database
      description: Creates a new database in a cluster.
      operationId: createClusterDatabase
      parameters:
        - name: database_uuid
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the database cluster.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseCreate'
      responses:
        '201':
          description: Database created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDatabase'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  # Load Balancer Endpoints
  /v2/load_balancers:
    get:
      tags:
        - Load Balancers
      summary: List Load Balancers
      description: Returns a list of all load balancers in your account.
      operationId: listLoadBalancers
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadBalancers'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Load Balancers
      summary: Create Load Balancer
      description: Creates a new load balancer.
      operationId: createLoadBalancer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadBalancerCreate'
      responses:
        '201':
          description: Load balancer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadBalancer'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validation failed
          $ref: '#/components/responses/UnprocessableEntity'

  /v2/load_balancers/{load_balancer_id}:
    get:
      tags:
        - Load Balancers
      summary: Get Load Balancer
      description: Returns information about a specific load balancer.
      operationId: getLoadBalancer
      parameters:
        - name: load_balancer_id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the load balancer.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadBalancer'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not found
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Load Balancers
      summary: Update Load Balancer
      description: Updates a load balancer's configuration.
      operationId: updateLoadBalancer
      parameters:
        - name: load_balancer_id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the load balancer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadBalancerUpdate'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadBalancer'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags:
        - Load Balancers
      summary: Delete Load Balancer
      description: Deletes a load balancer.
      operationId: deleteLoadBalancer
      parameters:
        - name: load_balancer_id
          in: path
          required: true
          schema:
            type: string
          description: The unique ID of the load balancer.
      responses:
        '204':
          description: Load balancer deleted
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  # Spaces Endpoints
  /v2/spaces:
    get:
      tags:
        - Spaces
      summary: List Spaces
      description: Returns a list of all Spaces in your account.
      operationId: listSpaces
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Spaces'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Spaces
      summary: Create Space
      description: Creates a new Space.
      operationId: createSpace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpaceCreate'
      responses:
        '201':
          description: Space created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Space'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  /v2/spaces/{space_name}:
    get:
      tags:
        - Spaces
      summary: Get Space
      description: Returns information about a specific Space.
      operationId: getSpace
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Space.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Space'
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags:
        - Spaces
      summary: Delete Space
      description: Deletes a Space.
      operationId: deleteSpace
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            type: string
          description: The name of the Space.
      responses:
        '204':
          description: Space deleted
        '401':
          description: Unauthorized
          $ref: '#/components/responses/Unauthorized'

  # Images Endpoints
  /v2/images:
    get:
      tags:
        - Images
      summary: List Images
      description: Returns a list of all images in your account.
      operationId: listImages
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
        - name: type
          in: query
          schema:
            type: string
            enum: [application, base, snapshot]
          description: Filter by image type
        - name: tag_name
          in: query
